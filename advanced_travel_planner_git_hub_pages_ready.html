<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grand Tour Европы 4.0 ☁️</title>

<!-- Firebase (простая синхронизация) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- Google Maps -->
<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places"></script>

<style>
body{font-family:Arial;margin:0;background:#eef2f5}
header{background:#1e2a38;color:white;padding:15px;text-align:center}
nav{display:flex;background:#2c3e50}
nav button{flex:1;padding:10px;border:none;color:white;background:#2c3e50;cursor:pointer}
nav button.active{background:#27ae60}
.container{padding:10px}
.card{background:white;padding:10px;margin-bottom:10px;border-radius:8px}
input{width:100%;margin:5px 0;padding:6px}
button{margin-top:5px;padding:6px 10px}
#map{height:300px;margin-bottom:10px}
</style>
</head>
<body>

<header>
<h1>Grand Tour Европы 4.0 ☁️</h1>
<button onclick="syncData()">Синхронизировать</button>
</header>

<nav>
<button onclick="showTab('map')" class="active">Карта</button>
<button onclick="showTab('route')">Маршрут</button>
<button onclick="showTab('share')">Поделиться</button>
</nav>

<div class="container">

<div id="mapTab">
<div id="map"></div>
<input id="searchBox" placeholder="Добавить точку">
<button onclick="searchPlace()">Добавить</button>
</div>

<div id="routeTab" style="display:none"></div>
<div id="shareTab" style="display:none"></div>

</div>

<script>
// 🔥 ВСТАВЬ СВОИ ДАННЫЕ FIREBASE
const firebaseConfig = {
  apiKey: "YOUR_FIREBASE_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let data = JSON.parse(localStorage.getItem("travelV4")) || {
points:[]
};

function save(){localStorage.setItem("travelV4",JSON.stringify(data));}

function syncData(){
db.collection("routes").doc("main").set(data);
alert("Синхронизировано ☁️");
}

function loadData(){
db.collection("routes").doc("main").get().then(doc=>{
if(doc.exists){
data = doc.data();
save();
render();
}
});
}

function showTab(tab){
document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");
["map","route","share"].forEach(t=>{
document.getElementById(t+"Tab").style.display="none";
});
document.getElementById(tab+"Tab").style.display="block";
render();
}

// MAP
let map, service;
function initMap(){
map=new google.maps.Map(document.getElementById("map"),{center:{lat:48,lng:11},zoom:5});
service=new google.maps.places.PlacesService(map);
loadData();
}

function searchPlace(){
let query=document.getElementById("searchBox").value;
service.textSearch({query},(res,status)=>{
if(status==='OK'){
let p=res[0];
data.points.push({name:p.name,lat:p.geometry.location.lat(),lng:p.geometry.location.lng()});
save();render();
}
});
}

// ROUTE
function renderRoute(){
let el=document.getElementById("routeTab");
el.innerHTML="<h2>Маршрут</h2>";

data.points.forEach((p,i)=>{
el.innerHTML+=`<div class='card'>
${p.name}
<button onclick="openNav(${p.lat},${p.lng})">Навигатор</button>
<button onclick="removePoint(${i})">Удалить</button>
</div>`;
});
}

function removePoint(i){ data.points.splice(i,1); save(); render(); }

function openNav(lat,lng){
window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`);
}

// SHARE LINK
function renderShare(){
let el=document.getElementById("shareTab");
let link = window.location.href + "?share=main";
el.innerHTML=`<h2>Поделиться</h2>
<p>Скопируй ссылку:</p>
<input value='${link}'>`;
}

function render(){
renderRoute();
renderShare();
}

window.onload=()=>{initMap();render();};
</script>

</body>
</html>
